name: Trigger Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.3.2)'
        required: true
        default: 'v0.3.2'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Triggering release for ${{ github.event.inputs.version }}"
