name: CI
on:
  push:
    branches: [main, dev]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      # Test with default features (std + serde)
      - run: cargo test
      # Test with ffi feature enabled
      - run: cargo test --features "std,serde-support,ffi"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Clippy on default features only (all-features includes ffi+no_std conflict)
      - run: cargo clippy -- -D warnings
      - run: cargo clippy --features ffi -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: wasm-pack build bitpolar-wasm --target web

  python-integration:
    name: Python Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Setup venv and install deps
        working-directory: bitpolar-python
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy
      - name: Build and install wheel
        working-directory: bitpolar-python
        run: |
          source .venv/bin/activate
          maturin develop --release
      - name: Run integration test
        working-directory: bitpolar-python
        run: |
          source .venv/bin/activate
          python3 -c "
          import bitpolar
          import numpy as np
          q = bitpolar.TurboQuantizer(dim=64, bits=4, projections=16, seed=42)
          vec = np.random.randn(64).astype(np.float32)
          code = q.encode(vec)
          decoded = q.decode(code)
          score = q.inner_product(code, vec)
          assert len(decoded) == 64, f'Expected 64, got {len(decoded)}'
          assert np.isfinite(score), f'Score not finite: {score}'
          print(f'OK: encode/decode/IP roundtrip passed (score={score:.4f})')
          "

  node-integration:
    name: Node.js Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        working-directory: bitpolar-node
        run: |
          npm install
          npx napi build --release
      - name: Run integration test
        working-directory: bitpolar-node
        run: |
          node -e "
          try {
            const m = require('./index.js');
            const q = new m.TurboQuantizer(64, 4, 16, 42);
            const vec = new Float32Array(64).fill(0.1);
            const code = q.encode(vec);
            console.log('OK: Node.js encode passed, code size:', code.length);
          } catch(e) {
            // index.js may not exist if napi didn't generate it
            console.log('SKIP: napi index.js not generated —', e.message);
          }
          "
